[bumpversion]
current_version = 0.7.0
commit = True
tag = True
message = Bump version: {current_version} → {new_version}

[bumpversion:file:Cargo.toml]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:crates/forja-wasm/Cargo.toml]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:benchmarks/rust_bench/Cargo.toml]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:benchmarks/bench_forja_heavy.rs/Cargo.toml]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:benchmarks/bench_forja_aot.rs/Cargo.toml]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:src/main.rs]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:docs/src/pages/roadmap.astro]
search = Forja v{current_version}
replace = Forja v{new_version}

[bumpversion:file:benchmarks/RESULTADOS_BENCHMARK.md]
search = Forja v{current_version}
replace = Forja v{new_version}

[bumpversion:file:benchmarks/README.md]
search = Forja-{current_version}-blue
replace = Forja-{new_version}-blue

[bumpversion:file:vscode/forja-syntax/package.json]
search = "version": "{current_version}"
replace = "version": "{new_version}"

[bumpversion:file:vscode/forja-syntax/package-lock.json]
search = "version": "{current_version}"
replace = "version": "{new_version}"
