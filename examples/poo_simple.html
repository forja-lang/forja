<!DOCTYPE html>
<html lang='es'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>Diagrama Forja</title>
<style>
  * {{ margin: 0; padding: 0; box-sizing: border-box; }}
  body {{ font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; }}
  .header {{ margin-bottom: 20px; padding: 16px 20px; background: #161b22; border-radius: 8px; border: 1px solid #30363d; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }}
  .header h1 {{ font-size: 1.3em; margin-right: auto; }}
  .stats {{ color: #8b949e; font-size: 0.85em; }}
  button, .btn {{ background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 0.8em; text-decoration: none; }}
  button:hover, .btn:hover {{ background: #30363d; }}
  button.activo {{ background: #1f6feb; border-color: #1f6feb; }}
  .vista {{ background: #161b22; border-radius: 8px; border: 1px solid #30363d; padding: 20px; overflow-x: auto; }}

  /* ========== VISTA ÁRBOL (default) ========== */
  .vista-arbol ul {{ list-style: none; padding-left: 24px; }}
  .vista-arbol li {{ margin: 2px 0; }}
  .vista-arbol .n {{ display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 6px; cursor: pointer; font-size: 0.85em; font-family: 'Cascadia Code', 'Fira Code', monospace; white-space: nowrap; border: 1px solid transparent; }}
  .vista-arbol .n:hover {{ border-color: #30363d; }}
  .vista-arbol .arw {{ display: inline-block; width: 12px; text-align: center; color: #484f58; font-size: 0.7em; transition: transform 0.15s; }}
  .vista-arbol .cl .arw {{ transform: rotate(-90deg); }}
  .vista-arbol .b {{ font-size: 0.7em; padding: 1px 6px; border-radius: 10px; }}
  .vista-arbol .ch {{ margin-left: 4px; border-left: 1px solid #21262d; padding-left: 8px; }}
  .vista-arbol .ch.hd {{ display: none; }}

  /* ========== VISTA FLUJO (PSeInt-style) ========== */
  .vista-flujo {{ display: none; }}
  .vista-flujo .flow {{ display: flex; flex-direction: column; align-items: center; gap: 0; padding: 20px 0; }}
  .vista-flujo .fnode {{ display: flex; flex-direction: column; align-items: center; position: relative; }}
  .vista-flujo .fbox {{ padding: 8px 16px; font-size: 0.8em; font-family: 'Cascadia Code', monospace; text-align: center; min-width: 100px; max-width: 300px; border: 2px solid #30363d; position: relative; }}
  .vista-flujo .arrow {{ color: #484f58; font-size: 1.2em; padding: 2px 0; line-height: 1; }}
  .vista-flujo .f-start {{ background: #1a3a2a; border-radius: 20px; border-color: #2ea043; }}
  .vista-flujo .f-end {{ background: #3a1a1a; border-radius: 20px; border-color: #f85149; }}
  .vista-flujo .f-proc {{ background: #1a2a3a; border-radius: 4px; border-color: #1f6feb; }}
  .vista-flujo .f-io {{ background: #2a2a1a; border-radius: 4px; border-color: #d29922; font-style: italic; }}
  .vista-flujo .f-cond {{ background: #3a2a1a; min-width: 120px; min-height: 60px; transform: rotate(45deg); border-color: #d29922; }}
  .vista-flujo .f-cond .ftext {{ transform: rotate(-45deg); display: inline-block; }}
  .vista-flujo .f-call {{ background: #2a1a3a; border-radius: 4px; border-color: #8957e5; }}
  .vista-flujo .f-ret {{ background: #3a1a1a; border-radius: 12px; border-color: #f85149; }}
  .vista-flujo .f-branch {{ display: flex; gap: 40px; justify-content: center; margin: 4px 0; }}
  .vista-flujo .f-branch-col {{ display: flex; flex-direction: column; align-items: center; }}
  .vista-flujo .f-label {{ font-size: 0.7em; color: #8b949e; margin: 0 4px; }}

  /* ========== COLORES (compartidos) ========== */
  .nv, .fv {{ background: #1f3a3a; }} .bv {{ background: #238636; color: #fff; }}
  .nf, .ff {{ background: #1a2a3a; }} .bf {{ background: #1f6feb; color: #fff; }}
  .nc, .fc {{ background: #2a1a3a; }} .bc {{ background: #8957e5; color: #fff; }}
  .ns, .fs {{ background: #3a2a1a; }} .bs {{ background: #d29922; color: #fff; }}
  .nb, .fb {{ background: #1a3a2a; }} .bb {{ background: #2ea043; color: #fff; }}
  .nl, .fl {{ background: #2a2a3a; }} .bl {{ background: #bc8cff; color: #fff; }}
  .nr, .fr {{ background: #3a1a1a; }} .br {{ background: #f85149; color: #fff; }}
  .na, .fa {{ background: #1a2a2a; }} .ba {{ background: #58a6ff; color: #fff; }}
  .ni, .fi {{ background: #2a2a1a; }} .bi {{ background: #3fb950; color: #fff; }}
  .ne, .fe {{ background: #1a1a2a; }} .be {{ background: #79c0ff; color: #fff; }}

  /* ========== PRINT / PDF ========== */
  @media print {{
    body {{ background: #fff; color: #000; padding: 0; }}
    .header {{ display: none; }}
    .vista {{ border: none; padding: 10px; background: #fff; }}
    .vista-arbol ul {{ padding-left: 16px; }}
    .vista-arbol .n {{ border-color: #ccc !important; }}
    .vista-arbol .ch {{ display: block !important; }}
    .vista-arbol .cl .arw {{ transform: none; }}
    .nv, .fv {{ background: #e8f5e9; }} .nf, .ff {{ background: #e3f2fd; }}
    .nc, .fc {{ background: #f3e5f5; }} .ns, .fs {{ background: #fff3e0; }}
    .nb, .fb {{ background: #e8f5e9; }} .nr, .fr {{ background: #ffebee; }}
    @page {{ margin: 1cm; }}
  }}
</style>
</head>
<body>
<div class='header'>
  <h1>🔨 Diagrama Forja</h1>
  <span class='stats'>4 declaraciones</span>
  <button id='btnArbol' class='activo' onclick="cambiarVista('arbol')">🌳 Árbol</button>
  <button id='btnFlujo' onclick="cambiarVista('flujo')">🔀 Diagrama de flujo</button>
  <button onclick="expandir()">Expandir</button>
  <button onclick="colapsar()">Colapsar</button>
  <button onclick="window.print()">📄 Exportar PDF</button>
</div>
<div id='vistaArbol' class='vista vista-arbol'>
<ul>
<li><span id='n0' class='n nc cl'><span class='arw'> </span> 🏭 Punto <span class='b bclase'>clase</span></span>
</li>
<li><span id='n1' class='n nv cl'><span class='arw'> </span> 📦 p=nuevo Punto() <span class='b bvariable'>variable</span></span>
</li>
<li><span id='n2' class='n nl cl'><span class='arw'> </span> 🖨️ escribir(p.x) <span class='b bllamada'>llamada</span></span>
</li>
<li><span id='n3' class='n nl cl'><span class='arw'> </span> 🖨️ escribir(p.y) <span class='b bllamada'>llamada</span></span>
</li>

</ul>
</div>
<div id='vistaFlujo' class='vista vista-flujo'>
<div class='flow'>
<div class='fnode'><div class='fbox f-start'>INICIO</div></div>
<div class='fnode'><div class='arrow'>⬇</div></div>
<div class='fnode'><div class='arrow'>⬇</div></div>
<div class='fnode'><div class='fbox f-call fc'>🏭 Punto</div></div>
<div class='fnode'><div class='arrow'>⬇</div></div>
<div class='fnode'><div class='fbox f-proc fv'>📦 p = nuevo Punto()</div></div>
<div class='fnode'><div class='arrow'>⬇</div></div>
<div class='fnode'><div class='fbox f-call fl'>🖨️ escribir(p.x)</div></div>
<div class='fnode'><div class='arrow'>⬇</div></div>
<div class='fnode'><div class='fbox f-call fl'>🖨️ escribir(p.y)</div></div>

<div class='fnode'><div class='arrow'>⬇</div></div>
<div class='fnode'><div class='fbox f-end'>FIN</div></div>
</div>
</div>
<script>
var vistaActual = 'arbol';
function cambiarVista(vista) {
  document.getElementById('vistaArbol').style.display = vista === 'arbol' ? 'block' : 'none';
  document.getElementById('vistaFlujo').style.display = vista === 'flujo' ? 'block' : 'none';
  document.getElementById('btnArbol').className = vista === 'arbol' ? 'activo' : '';
  document.getElementById('btnFlujo').className = vista === 'flujo' ? 'activo' : '';
  vistaActual = vista;
}
function toggle(id) {
  var el = document.getElementById('c'+id);
  var n = document.getElementById('n'+id);
  if (el.classList.contains('hd')) { el.classList.remove('hd'); n.classList.remove('cl'); }
  else { el.classList.add('hd'); n.classList.add('cl'); }
}
function expandir() {
  document.querySelectorAll('.ch').forEach(function(e) { e.classList.remove('hd'); });
  document.querySelectorAll('.n').forEach(function(e) { e.classList.remove('cl'); });
}
function colapsar() {
  document.querySelectorAll('.ch').forEach(function(e) { e.classList.add('hd'); });
  document.querySelectorAll('.n').forEach(function(e) { e.classList.add('cl'); });
}
</script>
</body>
</html>
