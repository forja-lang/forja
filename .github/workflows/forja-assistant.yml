name: 🤖 Forja Assistant
on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

jobs:
  answer:
    if: contains(github.event.issue.labels.*.name, 'pregunta') || contains(github.event.issue.labels.*.name, 'question') || github.event_name == 'issues' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Search keywords and respond
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Cargar INSTRUCCIONES.md
            const instrucciones = fs.readFileSync('INSTRUCCIONES.md', 'utf-8');

            // Obtener título y cuerpo del issue
            const title = context.payload.issue.title.toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();
            const combinedText = title + ' ' + body;

            // Extraer bloques de palabras clave del INSTRUCCIONES.md
            // Formato: ## N. `palabra` / `alias`
            const keywordRegex = /## (\d+)\. `([^`]+)`(?:\s*\/\s*`([^`]+)`)?/g;
            const matches = [...instrucciones.matchAll(keywordRegex)];

            // Buscar coincidencias en el texto del issue
            let foundKeywords = [];
            for (const match of matches) {
              const keyword = match[2].toLowerCase();
              const alias = match[3] ? match[3].toLowerCase() : '';
              if (combinedText.includes(keyword) || (alias && combinedText.includes(alias))) {
                foundKeywords.push({
                  number: match[1],
                  keyword: match[2],
                  alias: match[3] || null
                });
              }
            }

            // Extraer secciones relevantes para cada keyword encontrada
            let responseSections = [];
            const sections = instrucciones.split(/^## /m);
            for (const kw of foundKeywords) {
              // Buscar sección que contiene la keyword
              for (const section of sections) {
                if (section.startsWith(`${kw.number}. \`${kw.keyword}\``) ||
                    section.includes(`\`${kw.keyword}\``)) {
                  // Extraer nombre y ejemplos
                  const lines = section.split('\n').slice(0, 15).join('\n');
                  responseSections.push(lines.trim());
                  break;
                }
              }
            }

            // Construir respuesta
            let comment = '';

            if (foundKeywords.length > 0) {
              comment += '## 🤖 ¡Hola! Forja Assistant aquí\n\n';
              comment += 'Encontré estas palabras clave de Forja relacionadas con tu consulta:\n\n';

              for (let i = 0; i < foundKeywords.length; i++) {
                const kw = foundKeywords[i];
                comment += `### ${kw.number}. \`${kw.keyword}\``;
                if (kw.alias) comment += ` / \`${kw.alias}\``;
                comment += '\n\n';

                // Buscar ejemplos de código en la sección
                if (responseSections[i]) {
                  // Extraer bloques de código
                  const codeBlocks = responseSections[i].match(/```[\s\S]*?```/g);
                  if (codeBlocks) {
                    for (const block of codeBlocks.slice(0, 2)) {
                      comment += block + '\n\n';
                    }
                  }
                }
              }

              comment += '---\n';
              comment += '📖 Consultá la documentación completa en [`INSTRUCCIONES.md`](INSTRUCCIONES.md)\n';
              comment += '💻 Probá los ejemplos en [`examples/`](examples/)\n';
            } else {
              comment += '## 🤖 ¡Hola! Forja Assistant aquí\n\n';
              comment += 'No encontré una palabra clave específica en tu consulta. 😅\n\n';
              comment += 'Acá tenés algunos recursos que pueden ayudarte:\n\n';
              comment += '- 📖 **[Guía completa del lenguaje](INSTRUCCIONES.md)** — Todas las palabras clave con ejemplos\n';
              comment += '- 💻 **[Ejemplos prácticos](examples/)** — Más de 190 ejemplos listos para ejecutar\n';
              comment += '- 📚 **[Documentación oficial](https://forja-lang.github.io/docs)** — Sitio web con documentación\n';
              comment += '- 🔧 **Probá en el playground**: `forja ejecutar ejemplos/01_hola.fa`\n\n';
              comment += 'Si tenés una pregunta específica sobre alguna palabra clave, mencionala en el issue y voy a poder ayudarte mejor. 🙌\n';
            }

            // Agregar disclaimer
            comment += '\n---\n';
            comment += '> 🤖 *Soy un bot automático. Si necesitás ayuda más específica, etiquetá a un mantenedor.*\n';

            // Crear comentario
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
