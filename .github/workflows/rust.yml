name: Forja CI/CD

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'src/**'
      - 'patches/**'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - '.github/workflows/rust.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - 'patches/**'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - '.github/workflows/rust.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --verbose

  build-android:
    name: Build Android
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - aarch64-linux-android
          - x86_64-linux-android
          - armv7-linux-androideabi
          - i686-linux-android
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
      - name: Install Rust targets
        run: rustup target add ${{ matrix.target }}
      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27
          add-to-path: false
      - name: Build for ${{ matrix.target }}
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          NDK_BIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          case "${{ matrix.target }}" in
            aarch64-linux-android)
              LINKER="$NDK_BIN/aarch64-linux-android23-clang"
              ;;
            x86_64-linux-android)
              LINKER="$NDK_BIN/x86_64-linux-android23-clang"
              ;;
            armv7-linux-androideabi)
              LINKER="$NDK_BIN/armv7a-linux-androideabi23-clang"
              ;;
            i686-linux-android)
              LINKER="$NDK_BIN/i686-linux-android23-clang"
              ;;
          esac
          echo "Using linker: $LINKER"
          export "CARGO_TARGET_$(echo ${{ matrix.target }} | tr '[:lower:]-' '[:upper:]_')_LINKER=$LINKER"
          cargo build --target ${{ matrix.target }} --features gui --release --verbose
      - name: Upload artifact (${{ matrix.target }})
        uses: actions/upload-artifact@v4
        with:
          name: forja-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/forja

  build:
    name: Build (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
      - name: Build
        run: |
          cargo build --release --bins --features all --verbose
          cargo build -p forja-rt --release --verbose
      - name: Build Windows Installer (Inno Setup)
        if: matrix.os == 'windows-latest'
        run: |
          iscc /O. installer.iss
      - name: Stage Artifacts (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir staging
          copy target\release\forja.exe staging\
          copy target\release\forja-lsp.exe staging\
          copy target\release\forja-dap.exe staging\
          copy target\release\forja-rt.exe staging\
          copy forja-installer-x64.exe staging\
      - name: Stage Artifacts (Linux / macOS)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir staging
          cp target/release/forja target/release/forja-lsp target/release/forja-dap target/release/forja-rt staging/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: forja-${{ matrix.os }}
          path: staging/*

  build-aar:
    name: Build Android AAR
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: |
            aarch64-linux-android
            x86_64-linux-android
            armv7-linux-androideabi
            i686-linux-android
      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27
          add-to-path: false
      - name: Build AAR
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          bash scripts/build-aar.sh
      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: forja-android-aar
          path: dist/forja-android-rt-*.aar

  build-wasm:
    name: Build WASM
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - name: Install wasm-bindgen
        run: cargo install wasm-bindgen-cli
      - name: Build forja-wasm
        run: cargo build --package forja-wasm --target wasm32-unknown-unknown --release
      - name: Generate WASM bindings
        run: |
          wasm-bindgen \
            target/wasm32-unknown-unknown/release/forja_wasm.wasm \
            --out-dir wasm-output \
            --target web
      - name: Install wasm-opt (binaryen)
        run: sudo apt-get install -y binaryen
      - name: Optimize WASM with wasm-opt
        run: wasm-opt --enable-bulk-memory --enable-nontrapping-float-to-int --enable-sign-ext -O3 wasm-output/forja_wasm_bg.wasm -o wasm-output/forja_wasm_bg.wasm
      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: forja-wasm
          path: wasm-output/*

  release:
    name: Create Release
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: [build, build-wasm, build-aar]
    permissions:
      contents: write
      attestations: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Get version
        run: echo "VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)" >> $GITHUB_ENV
      - name: Prepare binaries
        shell: bash
        run: |
          mkdir -p binaries
          # Linux
          cp artifacts/forja-ubuntu-latest/forja binaries/forja-linux
          cp artifacts/forja-ubuntu-latest/forja-lsp binaries/forja-lsp-linux
          cp artifacts/forja-ubuntu-latest/forja-dap binaries/forja-dap-linux
          cp artifacts/forja-ubuntu-latest/forja-rt binaries/forja-rt-linux
          # macOS
          cp artifacts/forja-macOS-latest/forja binaries/forja-macos
          cp artifacts/forja-macOS-latest/forja-lsp binaries/forja-lsp-macos
          cp artifacts/forja-macOS-latest/forja-dap binaries/forja-dap-macos
          cp artifacts/forja-macOS-latest/forja-rt binaries/forja-rt-macos
          # Windows
          cp artifacts/forja-windows-latest/forja.exe binaries/forja.exe
          cp artifacts/forja-windows-latest/forja-lsp.exe binaries/forja-lsp.exe
          cp artifacts/forja-windows-latest/forja-dap.exe binaries/forja-dap.exe
          cp artifacts/forja-windows-latest/forja-rt.exe binaries/forja-rt.exe
          cp artifacts/forja-windows-latest/forja-installer-x64.exe binaries/forja-installer-x64.exe
          # WASM
          cp artifacts/forja-wasm/forja_wasm.js binaries/forja_wasm.js
          cp artifacts/forja-wasm/forja_wasm_bg.wasm binaries/forja_wasm_bg.wasm
          # Android AAR
          cp artifacts/forja-android-aar/forja-android-rt-*.aar binaries/
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: binaries/*
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: v0.8.5
          name: v0.8.5
          generate_release_notes: true
          files: binaries/*
