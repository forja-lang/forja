name: Forja CI/CD

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --verbose

  build-android:
    name: Build Android
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - aarch64-linux-android
          - x86_64-linux-android
          - armv7-linux-androideabi
          - i686-linux-android
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install Rust targets
        run: rustup target add ${{ matrix.target }}
      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27
          add-to-path: false
      - name: Build for ${{ matrix.target }}
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          NDK_BIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          case "${{ matrix.target }}" in
            aarch64-linux-android)
              LINKER="$NDK_BIN/aarch64-linux-android23-clang"
              ;;
            x86_64-linux-android)
              LINKER="$NDK_BIN/x86_64-linux-android23-clang"
              ;;
            armv7-linux-androideabi)
              LINKER="$NDK_BIN/armv7a-linux-androideabi23-clang"
              ;;
            i686-linux-android)
              LINKER="$NDK_BIN/i686-linux-android23-clang"
              ;;
          esac
          echo "Using linker: $LINKER"
          export "CARGO_TARGET_$(echo ${{ matrix.target }} | tr '[:lower:]-' '[:upper:]_')_LINKER=$LINKER"
          cargo build --target ${{ matrix.target }} --features gui --release --verbose
      - name: Upload artifact (${{ matrix.target }})
        uses: actions/upload-artifact@v4
        with:
          name: forja-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/forja

  build:
    name: Build (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Build
        run: cargo build --release --verbose
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: forja-${{ matrix.os }}
          path: target/release/forja${{ matrix.os == 'windows-latest' && '.exe' || '' }}

  build-wasm:
    name: Build WASM
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true
      - name: Install wasm-bindgen
        run: cargo install wasm-bindgen-cli
      - name: Build forja-wasm
        run: cargo build --package forja-wasm --target wasm32-unknown-unknown --release
      - name: Generate WASM bindings
        run: |
          wasm-bindgen \
            target/wasm32-unknown-unknown/release/forja_wasm.wasm \
            --out-dir wasm-output \
            --target web
      - name: Install wasm-opt (binaryen)
        run: sudo apt-get install -y binaryen
      - name: Optimize WASM with wasm-opt
        run: wasm-opt -O3 wasm-output/forja_wasm_bg.wasm -o wasm-output/forja_wasm_bg.wasm
      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: forja-wasm
          path: wasm-output/*

  release:
    name: Create Release
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: [build, build-wasm]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Get version
        run: echo "VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)" >> $GITHUB_ENV
      - name: Prepare binaries
        shell: bash
        run: |
          mkdir -p binaries
          cp artifacts/forja-ubuntu-latest/forja binaries/forja-linux
          cp artifacts/forja-macOS-latest/forja binaries/forja-macos
          cp artifacts/forja-windows-latest/forja.exe binaries/forja.exe
          cp artifacts/forja-wasm/forja_wasm.js binaries/forja_wasm.js
          cp artifacts/forja-wasm/forja_wasm_bg.wasm binaries/forja_wasm_bg.wasm
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          generate_release_notes: true
          files: binaries/*
