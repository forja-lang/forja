name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    working-directory: docs

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Download WASM playground from latest release
        continue-on-error: true
        run: |
          curl -sL --fail \
            https://github.com/forja-lang/forja/releases/latest/download/forja_wasm_bg.wasm \
            -o src/wasm/forja_wasm_bg.wasm
          curl -sL --fail \
            https://github.com/forja-lang/forja/releases/latest/download/forja_wasm.js \
            -o src/wasm/forja_wasm.js
          curl -sL --fail \
            https://github.com/forja-lang/forja/releases/latest/download/forja_wasm_gui_bg.wasm \
            -o src/wasm/forja_wasm_gui_bg.wasm
          curl -sL --fail \
            https://github.com/forja-lang/forja/releases/latest/download/forja_wasm_gui.js \
            -o src/wasm/forja_wasm_gui.js
      - name: Verify WASM files (restore from git if download failed)
        run: |
          ANY_FAILURE=0
          # Core WASM
          if [ ! -f src/wasm/forja_wasm.js ] || ! head -1 src/wasm/forja_wasm.js | grep -q "wasm-bindgen" 2>/dev/null; then
            echo "⚠️  Core download failed, restoring from git..."
            git checkout -- src/wasm/forja_wasm.js src/wasm/forja_wasm_bg.wasm 2>/dev/null || true
          fi
          # GUI WASM
          if [ ! -f src/wasm/forja_wasm_gui.js ] || ! head -1 src/wasm/forja_wasm_gui.js | grep -q "wasm-bindgen" 2>/dev/null; then
            echo "⚠️  GUI download failed, restoring from git..."
            git checkout -- src/wasm/forja_wasm_gui.js src/wasm/forja_wasm_gui_bg.wasm 2>/dev/null || true
          fi
          # Verify all files present
          for f in src/wasm/forja_wasm.js src/wasm/forja_wasm_bg.wasm \
                   src/wasm/forja_wasm_gui.js src/wasm/forja_wasm_gui_bg.wasm; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing: $f"
              ANY_FAILURE=1
            fi
          done
          if [ "$ANY_FAILURE" -eq 1 ]; then
            echo "❌ Some WASM files are missing — build may fail"
          else
            echo "✅ All WASM files ready"
          fi

      - run: npm ci
        env:
          npm_config_audit: false
          npm_config_fund: false
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
